<ion-app>
  <ion-menu side="start" contentId="main-content" class="account-side-menu">
    <ion-header class="ion-no-border">
      <div class="menu-header">
        <div class="user-avatar">
          <ion-icon name="person-circle"></ion-icon>
        </div>
        <div class="user-info">
          <h3>{{ userName }}</h3>
          <p>{{ userEmail }}</p>
        </div>
      </div>
    </ion-header>

    <ion-content class="ion-padding">
      <ion-list lines="none" class="sidebar-nav">
        <!-- Account Menu Items -->
        <ion-item button detail="false" (click)="openProfile()">
          <ion-icon name="person-outline" slot="start"></ion-icon>
          <ion-label>Profile</ion-label>
        </ion-item>
        
        <div class="menu-divider"></div>

        <ion-item button detail="false" (click)="openSettings()">
          <ion-icon name="settings-outline" slot="start"></ion-icon>
          <ion-label>Settings</ion-label>
        </ion-item>

        <ion-item button detail="false" (click)="openAbout()">
          <ion-icon name="information-circle-outline" slot="start"></ion-icon>
          <ion-label>About Us</ion-label>
        </ion-item>
        
        <div class="menu-divider"></div>
        
        <ion-item button detail="false" class="logout-item" (click)="logout()">
          <ion-icon name="log-out-outline" slot="start"></ion-icon>
          <ion-label>Logout</ion-label>
        </ion-item>
      </ion-list>
    </ion-content>
  </ion-menu>

  <ion-router-outlet id="main-content"></ion-router-outlet>
</ion-app>
