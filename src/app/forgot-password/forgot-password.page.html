<ion-content [fullscreen]="true" class="login-content">
  <div class="background-image"></div>
  <div class="background-overlay"></div>
  
  <div class="login-container">
    <div class="glass-card">
      <div class="header-section">
        <ion-button fill="clear" class="back-button" (click)="goBack()">
          <ion-icon name="arrow-back-outline" slot="icon-only"></ion-icon>
        </ion-button>
        <div class="logo-container">
          <ion-icon name="key-outline" class="main-logo"></ion-icon>
        </div>
        <h1>Reset Password</h1>
        <p>Enter your email to receive a reset link</p>
      </div>

      <div class="form-section">
        <ion-item lines="none" class="custom-input">
          <ion-icon name="mail-outline" slot="start"></ion-icon>
          <ion-input type="email" placeholder="Email Address" [(ngModel)]="email"></ion-input>
        </ion-item>

        <ion-button expand="block" shape="round" class="login-button" [disabled]="loading" (click)="resetPassword()">
          <ion-spinner *ngIf="loading" name="crescent"></ion-spinner>
          <span *ngIf="!loading">Send Reset Link</span>
        </ion-button>
      </div>

      <div class="footer-section">
        <p>Remembered your password? <a (click)="goBack()">Login</a></p>
      </div>
    </div>
  </div>
</ion-content>
