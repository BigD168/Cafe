<ion-content [fullscreen]="true" class="login-content">
  <div class="background-image"></div>
  <div class="background-overlay"></div>
  
  <div class="login-container">
    <div class="glass-card">
      <div class="header-section">
        <div class="logo-container">
          <ion-icon name="cafe-outline" class="main-logo"></ion-icon>
        </div>
        <h1>Welcome Back</h1>
        <p>Your premium coffee experience awaits</p>
      </div>

      <div class="form-section">
        <ion-item lines="none" class="custom-input">
          <ion-icon name="mail-outline" slot="start"></ion-icon>
          <ion-input type="email" placeholder="Email Address" [(ngModel)]="email"></ion-input>
        </ion-item>

        <ion-item lines="none" class="custom-input">
          <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
          <ion-input [type]="showPassword ? 'text' : 'password'" placeholder="Password" [(ngModel)]="password"></ion-input>
          <ion-button fill="clear" slot="end" (click)="showPassword = !showPassword">
            <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
          </ion-button>
        </ion-item>

        <div class="forgot-password">
          <a routerLink="/forgot-password">Forgot Password?</a>
        </div>

        <ion-button expand="block" shape="round" class="login-button" [disabled]="loading" (click)="login()">
          <ion-spinner *ngIf="loading" name="crescent"></ion-spinner>
          <span *ngIf="!loading">Sign In</span>
        </ion-button>
      </div>

      <div class="footer-section">
        <p>Don't have an account? <a routerLink="/signup" class="signup-link">Sign Up</a></p>
      </div>
    </div>
  </div>
</ion-content>
