<ion-content [fullscreen]="true" class="login-content">
  <div class="background-image"></div>
  <div class="background-overlay"></div>
  
  <div class="login-container">
    <div class="glass-card">
      <div class="header-section">
        <ion-button fill="clear" class="back-button" (click)="goBack()">
          <ion-icon name="arrow-back-outline" slot="icon-only"></ion-icon>
        </ion-button>
        <div class="logo-container profile-avatar" (click)="fileInput.click()">
          <ion-icon name="person-outline" class="main-logo" *ngIf="!user?.photoURL"></ion-icon>
          <img [src]="user?.photoURL" *ngIf="user?.photoURL" class="avatar-img" />
          <div class="camera-badge">
            <ion-icon name="camera-outline"></ion-icon>
          </div>
        </div>
        <input type="file" #fileInput (change)="onFileSelected($event)" accept="image/*" style="display: none" />
        <h1>My Profile</h1>
        <p>Manage your account settings</p>
      </div>

      <div class="form-section">
        <ion-item lines="none" class="custom-input">
          <ion-icon name="person-outline" slot="start"></ion-icon>
          <ion-input type="text" placeholder="Full Name" [(ngModel)]="name"></ion-input>
        </ion-item>

        <ion-item lines="none" class="custom-input disabled">
          <ion-icon name="mail-outline" slot="start"></ion-icon>
          <ion-input type="email" placeholder="Email Address" [(ngModel)]="email" readonly="true"></ion-input>
        </ion-item>

        <ion-button expand="block" shape="round" class="login-button" [disabled]="loading" (click)="updateProfile()">
          <ion-spinner *ngIf="loading" name="crescent"></ion-spinner>
          <ion-icon name="save-outline" slot="start" *ngIf="!loading"></ion-icon>
          <span *ngIf="!loading">Save Changes</span>
        </ion-button>
      </div>

      <div class="footer-section">
        <p>Member since {{ user?.metadata?.creationTime | date:'mediumDate' }}</p>
      </div>
    </div>
  </div>
</ion-content>
