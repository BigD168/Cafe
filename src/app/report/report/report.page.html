<ion-header class="ion-no-border custom-header animate-header">
  <div class="header-container">
    <div class="logo-text">
      <h2>Cafe Shop</h2>
    </div>
    
    <div class="greeting-row">
      <div class="menu-button" (click)="openMenu()">
        <ion-icon name="options-outline"></ion-icon>
      </div>
      <div class="greeting-text">
        <h2 class="prismatic-scatter">
          <span class="word">
            <span class="char" *ngFor="let char of pageTitleChars; let i = index" [style.animation-delay]="(i * 0.05 + 0.1) + 's'">
              {{char}}
            </span>
          </span>
        </h2>
        <p class="animate-header" style="animation-delay: 0.6s">Group 16</p>
      </div>
    </div>
  </div>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="animate-slide-left">
    <h2 class="page-title">Purchase History</h2>
    
    <div *ngIf="reports.length === 0" class="empty-history">
      <ion-icon name="analytics-outline"></ion-icon>
      <p>No purchase history yet.</p>
    </div>

    <ion-grid *ngIf="reports.length > 0" class="ion-no-padding">
      <ion-row>
        <ion-col size="12" size-md="6" size-lg="4" *ngFor="let report of reports; let i = index">
          <div class="report-card animate-item glass-shine-card" [style.animation-delay]="(i * 0.1 + 0.3) + 's'">
            <div class="report-header">
              <span class="report-date">{{ report.timestamp }}</span>
              <span class="report-total">${{ report.totalPrice.toFixed(2) }}</span>
            </div>
            <div class="report-items">
              <div *ngFor="let item of report.items" class="report-item">
                <span class="qty">{{ item.quantity }}x</span>
                <span class="name">{{ item.product.name }}</span>
                <span class="details" *ngIf="item.size">({{ item.size }})</span>
              </div>
            </div>
          </div>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>

   <!-- Spacing for tabs -->
   <div style="height: 100px;"></div>
</ion-content>

<ion-footer class="ion-no-border">
  <ion-tab-bar>
    <ion-tab-button [routerLink]="['/home']" routerLinkActive="tab-selected">
      <ion-icon name="home"></ion-icon>
      <ion-label>Home</ion-label>
    </ion-tab-button>
    <ion-tab-button [routerLink]="['/order']" routerLinkActive="tab-selected">
      <ion-icon name="cafe"></ion-icon>
      <ion-label>Order</ion-label>
    </ion-tab-button>
    <ion-tab-button [routerLink]="['/menu']" routerLinkActive="tab-selected">
      <ion-icon name="restaurant"></ion-icon>
      <ion-label>Menu</ion-label>
    </ion-tab-button>
    <ion-tab-button [routerLink]="['/report']" routerLinkActive="tab-selected">
      <ion-icon name="analytics"></ion-icon>
      <ion-label>Report</ion-label>
    </ion-tab-button>
  </ion-tab-bar>
</ion-footer>
