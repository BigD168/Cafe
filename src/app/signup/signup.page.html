<ion-content [fullscreen]="true" class="login-content">
  <div class="background-image"></div>
  <div class="background-overlay"></div>
  
  <div class="login-container">
    <div class="glass-card">
      <div class="header-section">
        <div class="logo-container">
          <ion-icon name="person-add-outline" class="main-logo"></ion-icon>
        </div>
        <h1>Create Account</h1>
        <p>Join our premium coffee community</p>
      </div>

      <div class="form-section">
        <ion-item lines="none" class="custom-input">
          <ion-icon name="person-outline" slot="start"></ion-icon>
          <ion-input type="text" placeholder="Full Name" [(ngModel)]="name"></ion-input>
        </ion-item>

        <ion-item lines="none" class="custom-input">
          <ion-icon name="mail-outline" slot="start"></ion-icon>
          <ion-input type="email" placeholder="Email Address" [(ngModel)]="email"></ion-input>
        </ion-item>

        <ion-item lines="none" class="custom-input">
          <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
          <ion-input [type]="showPassword ? 'text' : 'password'" placeholder="Password" [(ngModel)]="password"></ion-input>
          <ion-button fill="clear" slot="end" (click)="showPassword = !showPassword">
            <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
          </ion-button>
        </ion-item>

        <ion-item lines="none" class="custom-input">
          <ion-icon name="shield-checkmark-outline" slot="start"></ion-icon>
          <ion-input [type]="showPassword ? 'text' : 'password'" placeholder="Confirm Password" [(ngModel)]="confirmPassword"></ion-input>
        </ion-item>

        <ion-button expand="block" shape="round" class="login-button" [disabled]="loading" (click)="signUp()">
          <ion-spinner *ngIf="loading" name="crescent"></ion-spinner>
          <span *ngIf="!loading">Sign Up</span>
        </ion-button>
      </div>

      <div class="footer-section">
        <p>Already have an account? <a routerLink="/login">Login</a></p>
      </div>
    </div>
  </div>
</ion-content>
